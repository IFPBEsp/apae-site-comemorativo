# =====================================================================
# nginx de PRODUÇÃO (modelo unificado)
#
# Estado atual: HTTP (porta 80) — funciona via http://<IP-da-VM> ou domínio.
# Para ativar HTTPS: veja o bloco comentado no fim + o passo a passo no DEPLOY.md.
# =====================================================================

server {
    listen 80;
    server_name _;            # responde a qualquer host (IP ou domínio)

    client_max_body_size 50m; # uploads (documentos/minio) sem estourar

    # ---- APAE Geral ----
    location /apae-geral {
        proxy_pass http://apae-geral-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Site Comemorativo ----
    location /site-comemorativo {
        proxy_pass http://app:3000/site-comemorativo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Gestão Escolar ----
    location /gestao-escolar/api {
        proxy_pass http://gestao-escolar-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gestao-escolar {
        proxy_pass http://gestao-escolar-frontend:3000/gestao-escolar;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Raiz: redireciona para o site comemorativo (ajuste se quiser outra landing).
    location = / {
        return 302 /site-comemorativo;
    }
}

# =====================================================================
# HTTPS — habilite quando tiver domínio + certificado (Let's Encrypt).
# 1. Aponte o DNS do domínio para o IP da VM.
# 2. Gere o certificado (ver DEPLOY.md, seção TLS).
# 3. No docker-compose.prod.yml: exponha "443:443" e monte /etc/letsencrypt.
# 4. Troque "_" pelo seu domínio, descomente o bloco abaixo e o redirect.
# =====================================================================
#
